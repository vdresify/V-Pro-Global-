<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>V-Pro Global | Modular Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-storage-compat.js"></script>

    <style>
        /* [Design Styles - No changes needed here usually] */
        :root { --gold: #D4AF37; --black: #000; --card: #0d0d0d; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif; }
        body { background: var(--black); color: #fff; }
        .hidden { display: none !important; }
        .app-page { padding: 70px 15px 100px 15px; min-height: 100vh; }
        .card { background: var(--card); border: 1px solid #1a1a1a; padding: 15px; border-radius: 20px; margin-bottom: 15px; }
        .btn-gold { width:100%; padding:14px; background:var(--gold); border:none; border-radius:12px; font-weight:900; cursor:pointer; font-size:11px; }
        .god-input { width:100%; padding:12px; margin:8px 0; background:#080808; border:1px solid #222; color:#fff; border-radius:12px; }
        .bottom-nav { position:fixed; bottom:0; width:100%; background:rgba(0,0,0,0.9); display:flex; padding:15px 0; border-top:1px solid #111; }
        .nav-item { flex:1; text-align:center; color:#444; font-size:20px; }
        .nav-item.active { color:var(--gold); }
    </style>
</head>
<body>

    <div id="global-msg" onclick="core.godTrigger()" style="position:fixed; top:0; width:100%; padding:10px; background:var(--gold); color:#000; text-align:center; font-weight:900; z-index:9999; font-size:10px;">
        V-PRO GLOBAL ACTIVE
    </div>

    <div id="screen-auth" class="app-page hidden">
        <div class="card" style="text-align:center; margin-top:50px;">
            <h2 style="color:var(--gold)">V-PRO LOGIN</h2>
            <button class="btn-gold" style="margin-top:20px; background:#fff;" onclick="authMod.google()">Login with Google</button>
        </div>
    </div>

    <div id="app-main" class="hidden">
        
        <section id="page-home" class="app-page">
            <div class="card"><h4>V-PRO MARKET</h4><p>Coming Soon...</p></div>
            </section>

        <section id="page-profile" class="app-page hidden" style="text-align:center;">
            <img id="u-img" src="" style="width:100px; height:100px; border-radius:50%; border:2px solid var(--gold);">
            <h3 id="u-name">---</h3>
            <div class="card" style="margin-top:20px;">
                <p>V-Coins: <span id="u-coins" style="color:var(--gold)">0</span></p>
            </div>
            <button class="btn-gold" onclick="core.switch('edit')">EDIT PROFILE</button>
        </section>

        <section id="page-edit" class="app-page hidden">
            <div class="card">
                <h3>Update Info</h3>
                <input type="text" id="edit-name" class="god-input" placeholder="New Name">
                <button class="btn-gold" onclick="profileMod.save()">SAVE CHANGES</button>
            </div>
        </section>

        <section id="page-god" class="app-page hidden">
            <div class="card">
                <h3 style="color:var(--gold)">MASTER CONTROL</h3>
                <input type="text" id="ban-id" class="god-input" placeholder="Enter VPG-ID">
                <button class="btn-gold" onclick="godMod.ban(true)">BAN USER</button>
            </div>
        </section>

        </div>

    <nav id="nav-bar" class="bottom-nav hidden">
        <div class="nav-item active" onclick="core.switch('home', this)"><i class="fas fa-home"></i></div>
        <div class="nav-item" onclick="core.switch('profile', this)"><i class="fas fa-user"></i></div>
    </nav>

    <script>
        // --- 1. CONFIGURATION ---
        const firebaseConfig = { /* Aapki API Details */ };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore(), storage = firebase.storage();

        // --- 2. CORE ENGINE (Sab kuch control karne wala) ---
        const core = {
            userData: {},
            tap: 0,
            init: function(data) {
                this.userData = data;
                document.getElementById('u-name').innerText = data.name;
                document.getElementById('u-coins').innerText = data.vCoins;
                document.getElementById('u-img').src = data.profilePic || "default.png";
                // Agar aap Founder hain toh aura add karein
                if(auth.currentUser.email === "dreamchat26@gmail.com") document.getElementById('u-img').classList.add('founder-aura');
            },
            switch: function(id, el) {
                document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
                document.getElementById('page-' + id).classList.remove('hidden');
                if(el) {
                    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                    el.classList.add('active');
                }
            },
            godTrigger: function() {
                if(auth.currentUser.email === "dreamchat26@gmail.com") {
                    this.tap++; if(this.tap >= 7) { this.switch('god'); this.tap = 0; }
                }
            }
        };

        // --- 3. AUTH MODULE (Login/Logout) ---
        const authMod = {
            google: () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())
        };

        // --- 4. PROFILE MODULE (Edit/Photo) ---
        const profileMod = {
            save: async function() {
                const name = document.getElementById('edit-name').value;
                await db.collection('users').doc(auth.currentUser.uid).update({ name });
                alert("Updated!"); location.reload();
            }
        };

        // --- 5. GOD MODULE (Ban/Unban) ---
        const godMod = {
            ban: async (status) => {
                const vid = document.getElementById('ban-id').value;
                const snap = await db.collection('users').where('uniqueId', '==', vid).get();
                if(!snap.empty) { await snap.docs[0].ref.update({ isBanned: status }); alert("Action Done!"); }
            }
        };

        // --- 6. PLUGINS (Naye functions yahan add karein) ---
        const luckyDrawMod = {
            // Naya code yahan aayega bina purana chhede
        };

        // --- 7. THE GUARD (Auth Listener) ---
        auth.onAuthStateChanged(async user => {
            if(user) {
                const doc = await db.collection('users').doc(user.uid).get();
                if(doc.exists) {
                    if(doc.data().isBanned) { document.body.innerHTML = "BANNED"; return; }
                    document.getElementById('screen-auth').classList.add('hidden');
                    document.getElementById('app-main').classList.remove('hidden');
                    document.getElementById('nav-bar').classList.remove('hidden');
                    core.init(doc.data());
                } else {
                    // Create New User Logic
                }
            } else {
                document.getElementById('screen-auth').classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
