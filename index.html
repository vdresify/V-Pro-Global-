    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB4Wk-096y9SAhtygKGLoJ1EHZR0WWSUOc",
            authDomain: "v-pro-global.firebaseapp.com",
            projectId: "v-pro-global",
            storageBucket: "v-pro-global.firebasestorage.app",
            messagingSenderId: "741845554827",
            appId: "1:741845554827:web:04a75d2207df326d72a68e"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // 1. Redirect ki jagah Popup use karein (Behtar experience ke liye)
        function loginWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider)
                .then((result) => {
                    setupUser(result.user);
                }).catch((error) => {
                    console.error("Login Error:", error);
                    alert("Login fail ho gaya: " + error.message);
                });
        }

        // 2. Page load hote hi Auth check karein
        auth.onAuthStateChanged(user => {
            if (user) {
                setupUser(user);
            } else {
                showLogin();
            }
        });

        async function setupUser(user) {
            if (!user) return;

            try {
                const userRef = db.collection('users').doc(user.uid);
                let doc = await userRef.get();
                
                // Naya user hai toh database mein entry karein
                if (!doc.exists) {
                    const snap = await db.collection('users').get();
                    const newId = `ID: ${(snap.size + 1).toString().padStart(2, '0')}`;
                    await userRef.set({
                        uniqueId: newId, 
                        name: user.displayName, 
                        vCoins: 100, 
                        status: "Active",
                        email: user.email,
                        lastLogin: new Date()
                    });
                    doc = await userRef.get();
                }
                
                const data = doc.data();
                
                // UI Update - Dashboard dikhayein
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('dashboard-section').classList.remove('hidden');
                
                document.getElementById('display-name').innerText = data.name;
                document.getElementById('user-id').innerText = data.uniqueId;
                document.getElementById('nav-coins').innerText = data.vCoins;
                document.getElementById('user-img').src = user.photoURL || 'https://via.placeholder.com/65';
                
            } catch (error) {
                console.error("Database Error:", error);
            }
        }

        function showLogin() {
            document.getElementById('login-section').classList.remove('hidden');
            document.getElementById('dashboard-section').classList.add('hidden');
        }

        // Baki functions (openForm, logout, etc.) wahi rahenge...
        function openForm(type) {
            document.getElementById('form-overlay').style.display = "block";
            document.getElementById('form-title').innerText = type + " Registration";
            document.getElementById('form-fields').innerHTML = `<input id='f1' placeholder='Full Name'><textarea id='f2' placeholder='Professional Experience / Details'></textarea>`;
        }

        function closeForm() { document.getElementById('form-overlay').style.display = "none"; }

        async function handleSubmit() {
            alert("Data Submitted! Humari team aapse jald sampark karegi. ✅");
            closeForm();
        }

        function logout() { 
            auth.signOut().then(() => {
                location.reload(); // Logout ke baad page refresh karna behtar hai
            }); 
        }
    </script>
