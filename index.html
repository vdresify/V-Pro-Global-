<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>V-Pro Global | King's Edition</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-storage-compat.js"></script>

    <style>
        :root { 
            --gold: #D4AF37; --black: #000; --card: #0d0d0d; 
            --rainbow: linear-gradient(45deg, #f00, #ff0, #0f0, #0ff, #00f, #f0f, #f00);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--black); color: #fff; overflow-x: hidden; }
        .hidden { display: none !important; }

        /* --- KING'S EXCLUSIVE GLOWING FRAME --- */
        .founder-frame {
            position: relative; padding: 4px; border-radius: 50%;
            background: linear-gradient(45deg, #D4AF37, #FFF, #D4AF37, #FFD700);
            background-size: 400% 400%; animation: frameRotate 3s linear infinite;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.8); display: inline-block;
        }
        @keyframes frameRotate { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* Layout & UI Components */
        .app-page { padding-top: 65px; padding-bottom: 100px; min-height: 100vh; width: 100%; }
        .card { background: var(--card); border: 1px solid #1a1a1a; padding: 15px; border-radius: 20px; margin: 12px; }
        .btn-gold { width: 100%; padding: 14px; background: var(--gold); color: #000; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 11px; }
        .god-input { width: 100%; padding: 12px; margin: 8px 0; background: #080808; border: 1px solid #222; color: #fff; border-radius: 12px; font-size: 13px; outline: none; }
        
        .global-notify { background: var(--rainbow); background-size: 400%; padding: 10px; text-align: center; font-size: 10px; font-weight: 900; animation: rainbow-move 5s linear infinite; position: fixed; top: 0; width: 100%; z-index: 5000; color: #fff; }
        @keyframes rainbow-move { 0% { background-position: 0% 50% } 100% { background-position: 100% 50% } }

        /* Navigation */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.9); border-top: 1px solid #1a1a1a; display: flex; padding: 12px 0; z-index: 4000; backdrop-filter: blur(15px); }
        .nav-item { color: #444; text-align: center; flex: 1; cursor: pointer; }
        .nav-item.active { color: var(--gold); transform: translateY(-3px); transition: 0.3s; }
        .nav-item span { display: block; font-size: 8px; font-weight: 900; margin-top: 4px; }
    </style>
</head>
<body>

    <div id="global-msg" class="global-notify" onclick="app.triggerGod()">👑 V-PRO GLOBAL: SUPREME ACCESS ACTIVE</div>

    <div id="screen-auth" class="app-page hidden" style="text-align: center; padding: 40px 25px;">
        <h2 style="color:var(--gold); margin-bottom: 25px; font-weight: 900;">V-PRO ACCESS</h2>
        <div class="card">
            <input type="email" id="auth-email" class="god-input" placeholder="Email Address">
            <input type="password" id="auth-pass" class="god-input" placeholder="Password">
            <button class="btn-gold" onclick="authMod.emailLogin()">LOGIN</button>
            <p style="font-size: 10px; margin-top: 10px;" onclick="authMod.emailSignup()">New here? <span style="color:var(--gold)">Create Account</span></p>
        </div>
        <div style="margin: 15px; color: #333; font-weight: 800;">OR</div>
        <div class="card">
            <div id="recaptcha-container"></div>
            <input type="tel" id="auth-phone" class="god-input" placeholder="+91 Mobile Number">
            <button class="btn-gold" style="background:#222; color:#fff;" onclick="authMod.phoneLogin()">SEND OTP</button>
            <div id="otp-section" class="hidden">
                <input type="number" id="auth-otp" class="god-input" placeholder="Enter OTP" style="margin-top:10px;">
                <button class="btn-gold" onclick="authMod.verifyOtp()">VERIFY OTP</button>
            </div>
        </div>
        <button class="btn-gold" style="margin-top: 15px; background: #fff;" onclick="authMod.googleLogin()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" style="width:14px; vertical-align:middle; margin-right:8px;"> GOOGLE
        </button>
    </div>

    <div id="app-main" class="hidden">
        
        <section id="page-home" class="app-page">
            <div class="card" style="border-left: 4px solid var(--gold);">
                <h4 style="color:var(--gold)">⚡ ACTIVE TASKS</h4>
                <p id="timer-status" style="font-size: 11px;">Stay active for 10 min to earn 70 V-Coins!</p>
            </div>
        </section>

        <section id="page-profile" class="app-page hidden" style="text-align: center;">
            <div id="u-frame-container" style="margin: 20px auto;">
                <img id="u-img" src="" style="width:110px; height:110px; border-radius:50%; object-fit:cover;">
                <div id="u-medals" style="margin-top: -10px; display: flex; justify-content: center; gap: 5px;"></div>
            </div>
            <h2 id="u-name" style="font-weight: 900;">---</h2>
            <p id="u-vpg-id" style="color:var(--gold); font-size:12px; font-weight:900;">ID: FETCHING...</p>
            
            <div class="card" style="display: flex; justify-content: space-around; margin-top: 20px;">
                <div><b id="u-coins">0</b><br><small>V-COINS</small></div>
                <div><b id="u-strike">0</b><br><small>STRIKE</small></div>
            </div>
        </section>

        <section id="page-god" class="app-page hidden" style="padding: 15px;">
            <h2 style="color:var(--gold); text-align: center;">🔱 MASTER CONTROL</h2>
            <div class="card">
                <h4 style="color:var(--gold)">💰 PAYMENT GATEWAY</h4>
                <input type="file" id="qr-in" class="god-input" onchange="god.uploadQR(this)">
                <input type="text" id="god-upi" class="god-input" placeholder="Your UPI ID">
                <button class="btn-gold" onclick="god.savePayment()">SAVE GATEWAY</button>
            </div>
        </section>

        </div>

    <div id="nav-bar" class="bottom-nav hidden">
        <div class="nav-item active" onclick="app.switch('home', this)"><i class="fas fa-home"></i><span>HOME</span></div>
        <div class="nav-item" onclick="app.switch('market', this)"><i class="fas fa-shopping-bag"></i><span>MARKET</span></div>
        <div class="nav-item" onclick="app.switch('profile', this)"><i class="fas fa-user-circle"></i><span>PROFILE</span></div>
        </div>

    <script>
        // --- CORE INITIALIZATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyB4Wk-096y9SAhtygKGLoJ1EHZR0WWSUOc",
            authDomain: "v-pro-global.firebaseapp.com",
            projectId: "v-pro-global",
            storageBucket: "v-pro-global.firebasestorage.app",
            messagingSenderId: "741845554827",
            appId: "1:741845554827:web:04a75d2207df326d72a68e"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const storage = firebase.storage();

        let userData = {};
        let tapCount = 0;
        let scrollTime = 0;

        // --- MODULE: AUTHENTICATION ---
        const authMod = {
            emailSignup: async function() {
                try { await auth.createUserWithEmailAndPassword(document.getElementById('auth-email').value, document.getElementById('auth-pass').value); alert("Signed Up!"); } catch(e) { alert(e.message); }
            },
            emailLogin: async function() {
                try { await auth.signInWithEmailAndPassword(document.getElementById('auth-email').value, document.getElementById('auth-pass').value); } catch(e) { alert(e.message); }
            },
            phoneLogin: function() {
                const p = document.getElementById('auth-phone').value;
                window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {size:'invisible'});
                auth.signInWithPhoneNumber(p, window.recaptchaVerifier).then(res => {
                    window.conf = res; document.getElementById('otp-section').classList.remove('hidden'); alert("OTP Sent!");
                }).catch(e => alert(e.message));
            },
            verifyOtp: function() {
                window.conf.confirm(document.getElementById('auth-otp').value).then(() => location.reload()).catch(() => alert("Wrong OTP"));
            },
            googleLogin: () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())
        };

        // --- MODULE: REWARDS & TASKS ---
        const rewardMod = {
            startTimer: function() {
                setInterval(() => {
                    if (!document.hidden && auth.currentUser) {
                        scrollTime++;
                        if (scrollTime === 600) { this.claimScroll(); scrollTime = 0; }
                    }
                }, 1000);
            },
            claimScroll: async function() {
                await db.collection('users').doc(auth.currentUser.uid).update({ vCoins: firebase.firestore.FieldValue.increment(70) });
                alert("⚡ 70 V-Coins Earned!"); this.checkStrike();
            },
            checkStrike: async function() {
                const ref = db.collection('users').doc(auth.currentUser.uid);
                const d = (await ref.get()).data();
                const today = new Date().toLocaleDateString();
                if (d.lastActiveDate !== today) {
                    let s = (d.currentStrike || 0) + 1;
                    if (s === 21) { await ref.update({ vCoins: firebase.firestore.FieldValue.increment(1500), currentStrike: 0, lastActiveDate: today }); alert("🏆 1500 Mastery Bonus!"); }
                    else { await ref.update({ currentStrike: s, lastActiveDate: today }); }
                }
            },
            checkProfileBonus: async function() {
                const u = auth.currentUser;
                const d = (await db.collection('users').doc(u.uid).get()).data();
                if (u.email && (u.phoneNumber || d.phoneAttached) && !d.tasksCompleted?.includes('p_bonus')) {
                    await db.collection('users').doc(u.uid).update({ vCoins: firebase.firestore.FieldValue.increment(150), tasksCompleted: firebase.firestore.FieldValue.arrayUnion('p_bonus') });
                    alert("👑 150 Verification Bonus!");
                }
            }
        };

        // --- MAIN APP ENGINE ---
        const app = {
            switch: function(pageId, el) {
                document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
                const target = document.getElementById('page-' + pageId);
                if(target) target.classList.remove('hidden');
                if(el) {
                    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                    el.classList.add('active');
                }
            },
            loadUser: function() {
                const img = document.getElementById('u-img');
                const frame = document.getElementById('u-frame-container');
                const medals = document.getElementById('u-medals');
                
                document.getElementById('u-name').innerText = userData.name;
                document.getElementById('u-vpg-id').innerText = "ID: " + userData.uniqueId;
                document.getElementById('u-coins').innerText = (userData.vCoins || 0).toLocaleString();
                document.getElementById('u-strike').innerText = userData.currentStrike || 0;
                img.src = userData.profilePic || "https://via.placeholder.com/110";

                if(auth.currentUser.email === "dreamchat26@gmail.com") {
                    frame.className = "founder-frame";
                    medals.innerHTML = `<img src="https://cdn-icons-png.flaticon.com/512/5968/5968945.png" style="width:30px; filter:drop-shadow(0 0 5px gold);">`;
                }
            },
            triggerGod: function() {
                if(auth.currentUser.email === "dreamchat26@gmail.com") {
                    tapCount++; if(tapCount >= 7) { this.switch('god'); tapCount = 0; }
                }
            }
        };

        // --- GOD MODULE ---
        let tempQR = "";
        const god = {
            uploadQR: async (input) => {
                if(input.files[0]) {
                    const ref = storage.ref(`system/payment_qr`);
                    await ref.put(input.files[0]);
                    tempQR = await ref.getDownloadURL();
                    alert("QR Ready!");
                }
            },
            savePayment: async () => {
                await db.collection('system').doc('payment').set({ qr: tempQR, upi: document.getElementById('god-upi').value });
                alert("Gateway Live! ✅");
            }
        };

        // --- AUTH LISTENER ---
        auth.onAuthStateChanged(async user => {
            if(user) {
                document.getElementById('screen-auth').classList.add('hidden');
                document.getElementById('app-main').classList.remove('hidden');
                document.getElementById('nav-bar').classList.remove('hidden');
                
                const doc = await db.collection('users').doc(user.uid).get();
                if(doc.exists) {
                    userData = doc.data();
                    if(userData.isBanned) { document.body.innerHTML = "🚫 ACCESS DENIED"; return; }
                    app.loadUser(); rewardMod.startTimer(); rewardMod.checkProfileBonus();
                } else {
                    const vid = "VPG-" + Math.floor(1000 + Math.random()*9000);
                    await db.collection('users').doc(user.uid).set({ name: user.displayName||"Elite User", uniqueId: vid, vCoins: 100, role: "User" });
                    location.reload();
                }
            } else {
                document.getElementById('screen-auth').classList.remove('hidden');
                document.getElementById('app-main').classList.add('hidden');
                document.getElementById('nav-bar').classList.add('hidden');
            }
        });
    </script>
</body>
</html>
